<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <link rel="stylesheet" href="/Counter/assets/styles.css">
</head>
<body>
    <div id="count">
        <h1>JavaScript Project</h1>
        <h2>Counter</h2>

        <p style="font-size:40px;">0</p>

        <button onclick="increaseCount()">+</button>
        <button onclick="decreaseCount()">-</button>
        <button onclick="resetCount()">Reset</button>
        <button onclick="saveCount()">Save</button>
        <button onclick="loadCount()">Load</button>
    
    </div>

    <script src="/Counter/assets/counter.js"></script>
</body>
</html>
